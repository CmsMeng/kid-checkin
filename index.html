    } else {
      manualArea.style.display = '';
      ocrArea.classList.remove('show');
      labelManual.classList.add('active');
      labelOCR.classList.remove('active');
      this.clearAll();
    }
  },

  /* 拍照 */
  capture() {
    document.getElementById('ocrCaptureInput').click();
  },

  /* 从相册选择 */
  pickFromGallery() {
    document.getElementById('ocrFileInput').click();
  },

  /* 文件选中回调 */
  onFilePicked(e) {
    const file = e.target.files[0];
    if (!file) return;
    // 重置 input 以便重复选同一文件
    e.target.value = '';

    if (!file.type.startsWith('image/')) {
      showToast('请选择图片文件 📷');
      return;
    }

    // 显示预览
    const reader = new FileReader();
    reader.onload = (ev) => {
      document.getElementById('ocrPreviewImg').src = ev.target.result;
      document.getElementById('ocrPreview').classList.add('show');
      document.getElementById('ocrError').classList.remove('show');
      document.getElementById('ocrResultPanel').classList.remove('show');
      this.startOCR(ev.target.result);
    };
    reader.readAsDataURL(file);
  },

  /* 重新选择图片 */
  resetImage() {
    document.getElementById('ocrPreview').classList.remove('show');
    document.getElementById('ocrPreviewImg').src = '';
    document.getElementById('ocrLoading').classList.remove('show');
    document.getElementById('ocrError').classList.remove('show');
    document.getElementById('ocrResultPanel').classList.remove('show');
    this._ocrResults = [];
  },

  /* 图片预处理：缩放 + 灰度 + 对比度增强 + 二值化 */
  async _preprocessImage(imageDataURL) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        // 限制最大尺寸 1800px（平衡速度与精度）
        const MAX = 1800;
        let w = img.width, h = img.height;
        if (w > h && w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
        else if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }

        canvas.width = w;
        canvas.height = h;
        ctx.drawImage(img, 0, 0, w, h);

        const imageData = ctx.getImageData(0, 0, w, h);
        const d = imageData.data;

        // 灰度 + 自适应对比度拉伸 + 锐化
        for (let i = 0; i < d.length; i += 4) {
          const gray = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
          // 对比度拉伸：暗部更暗，亮部更亮
          let v;
          if (gray < 90)       v = gray * 0.6;                // 深色压缩
          else if (gray > 200) v = Math.min(255, 200 + (gray - 200) * 1.5); // 亮部拉伸
          else                 v = 50 + (gray - 90) * 1.2;    // 中间调增强
          d[i] = d[i + 1] = d[i + 2] = v;
        }

        ctx.putImageData(imageData, 0, 0);
        // 输出 JPEG，质量 0.92
        resolve(canvas.toDataURL('image/jpeg', 0.92));
      };
      img.onerror = () => reject(new Error('图片加载失败'));
      img.src = imageDataURL;
    });
  },

  /* 启动 OCR */
  async startOCR(imageDataURL) {
    const loadingEl = document.getElementById('ocrLoading');
    const loadingText = document.getElementById('ocrLoadingText');
    const progressFill = document.getElementById('ocrProgressFill');
    const errorEl = document.getElementById('ocrError');
    const errorMsg = document.getElementById('ocrErrorMsg');
    const resultPanel = document.getElementById('ocrResultPanel');

    loadingEl.classList.add('show');
    errorEl.classList.remove('show');
    resultPanel.classList.remove('show');
    progressFill.style.width = '0%';

    // 30 秒超时（云端识别通常 1-3 秒）
    const controller = new AbortController();
    this._timeoutId = setTimeout(() => {
      controller.abort();
      loadingEl.classList.remove('show');
      if (errorMsg) errorMsg.textContent = '识别超时，请检查网络后重试';
      errorEl.classList.add('show');
    }, 30000);

    try {
      // ── 第1步：图片预处理 ──
      loadingText.textContent = '预处理图片...';
      progressFill.style.width = '15%';
      const processedURL = await this._preprocessImage(imageDataURL);

      // 上传到云端 OCR
      loadingText.textContent = '上传图片中...';
      progressFill.style.width = '30%';

      // 去掉 data:image/...;base64, 前缀
      const base64 = processedURL.includes(',') ? processedURL.split(',')[1] : processedURL;

      const resp = await fetch(OCR_WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: base64 }),
        signal: controller.signal,
      });

      loadingText.textContent = '云端识别中...';
      progressFill.style.width = '70%';

      const result = await resp.json();
      clearTimeout(this._timeoutId);
      loadingEl.classList.remove('show');

      // 检查百度 OCR API 错误
      if (result.error_code) {
        const apiErrors = {
          17:  '今日识别次数已用完（500次/天），请明天再试',
          18:  '今日识别次数已用完，请明天再试',
          19:  '今日识别次数已用完，请明天再试',
          100: '识别服务暂不可用，请稍后重试',
          216100: '图片内容为空或无法识别',
          216101: '图片格式不支持',
          216102: '图片太大，请尝试裁剪后重试',
          216103: '图片尺寸太小，请使用更清晰的图片',
          282000: '服务器内部错误，请稍后重试',
        };
        const msg = apiErrors[result.error_code] || ('识别失败：' + (result.error_msg || '未知错误'));
        if (errorMsg) errorMsg.textContent = msg;
        errorEl.classList.add('show');
        console.error('Baidu OCR error:', result.error_code, result.error_msg);
        return;
      }

      // 百度返回: { words_result: [{ words: "line1" }, ...], words_result_num: N }
      const wordsResult = result.words_result || [];
      const text = wordsResult.map(item => item.words || '').join('\n').trim();
      if (!text || text.length < 2) {
        if (errorMsg) errorMsg.textContent = '未识别到文字，请确保图片清晰、光线充足';
        errorEl.classList.add('show');
        return;
      }

      // ── 第6步：解析结果 ──
      this._parseText(text);
      if (this._ocrResults.length === 0) {
        if (errorMsg) errorMsg.textContent = '未能解析出作业条目，请检查图片内容';
        errorEl.classList.add('show');
        return;
      }

      this._renderResults();
      resultPanel.classList.add('show');

      // 低置信度提示但不阻止使用
      showToast('已识别 ' + this._ocrResults.length + ' 条作业 📋');
    } catch (err) {
      clearTimeout(this._timeoutId);
      loadingEl.classList.remove('show');

      let msg = '识别失败，请尝试更清晰的图片或手动输入';
      if (err && err.name === 'AbortError') {
        msg = '识别超时，请检查网络后重试';
      } else
      if (err && err.message) {
        if (err.message.includes('NetworkError') || err.message.includes('Failed to fetch')) {
          msg = '无法连接识别服务，请检查网络连接';
        } else if (err.message.includes('timeout') || err.message.includes('Timeout')) {
          msg = '识别超时，请检查网络后重试';
        } else if (err.message.includes('图片加载失败')) {
          msg = '图片加载失败，请重新选择';
        }
      }
      if (errorMsg) errorMsg.textContent = msg;
      errorEl.classList.add('show');
      console.error('OCR error:', err);
    }
  },


  /* 智能文本解析 */
  _parseText(text) {
    this._ocrResults = [];

    // 先按行拆分
    const rawLines = text.split(/[\n\r]+/).map(l => l.trim()).filter(Boolean);
    if (rawLines.length === 0) return;

    // 尝试按序号模式分割
    let items = [];
    for (const line of rawLines) {
      // 检查行内是否包含多个序号
      const hasSplit = this.SPLIT_PATTERNS.some(p => {
        const m = line.match(new RegExp(p.source, 'g'));
        return m && m.length > 1;
      });

      if (hasSplit) {
        // 按序号拆分
        const parts = this._splitByNumber(line);
        items.push(...parts);
      } else {
        items.push(line);
      }
    }

    if (items.length === 0) items = rawLines;

    // 为每个条目检测科目
    for (const item of items) {
      const cleaned = item
        .replace(/^[\d一二三四五六七八九十]+[\.\)、]\s*/, '')
        .replace(/^[（(]\d+[)）]\s*/, '')
        .replace(/^[❶❷❸❹❺❻❼❽❾❿]\s*/, '')
        .trim();

      if (!cleaned || cleaned.length < 1) continue;

      const subject = this._detectSubject(cleaned);
      this._ocrResults.push({
        id: 'ocr_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
        subject,
        content: cleaned.length > 40 ? cleaned.substring(0, 40) : cleaned,
      });
    }
  },

  /* 按序号分割一行文本 */
  _splitByNumber(line) {
    // 先尝试匹配中文序号
    const cnMatch = line.match(/[一二三四五六七八九十]+[、.]/g);
    if (cnMatch && cnMatch.length > 1) {
      const parts = [];
      let remaining = line;
      const pattern = /([一二三四五六七八九十]+[、.])/g;
      let lastIdx = 0;
      let m;
      while ((m = pattern.exec(line)) !== null) {
        if (lastIdx > 0) {
          parts.push(line.substring(lastIdx, m.index).trim());
        }
        lastIdx = m.index + m[0].length;
      }
      if (lastIdx < line.length) {
        parts.push(line.substring(lastIdx).trim());
      }
      return parts;
    }

    // 尝试匹配数字序号
    const numMatch = line.match(/\d+[\.\)、]/g);
    if (numMatch && numMatch.length > 1) {
      const parts = line.split(/\d+[\.\)、]\s*/).filter(Boolean);
      return parts;
    }

    return [line];
  },

  /* 科目检测 */
  _detectSubject(text) {
    const t = text.toLowerCase();
    for (const [subject, keywords] of Object.entries(this.SUBJECT_KEYWORDS)) {
      for (const kw of keywords) {
        if (t.includes(kw.toLowerCase())) return subject;
      }
    }
    return '其他';
  },

  /* 渲染识别结果列表 */
  _renderResults() {
    const list = document.getElementById('ocrResultList');
    list.innerHTML = '';

    this._ocrResults.forEach((item, idx) => {
      const row = document.createElement('div');
      row.className = 'ocr-result-item';
      row.style.animationDelay = (idx * 0.04) + 's';

      const sel = document.createElement('select');
      ['语文','数学','英语','科学','其他'].forEach(s => {
        const opt = document.createElement('option');
        opt.value = s;
        opt.textContent = s;
        if (s === item.subject) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.onchange = () => { item.subject = sel.value; };

      const inp = document.createElement('input');
      inp.type = 'text';
      inp.value = item.content;
      inp.maxLength = 40;
      inp.oninput = () => { item.content = inp.value.trim(); };

      const del = document.createElement('button');
      del.className = 'btn-ocr-del';
      del.textContent = '×';
      del.onclick = () => {
        this._ocrResults = this._ocrResults.filter(r => r.id !== item.id);
        if (this._ocrResults.length === 0) {
          document.getElementById('ocrResultPanel').classList.remove('show');
          document.getElementById('ocrResultList').innerHTML = '';
        } else {
          this._renderResults();
        }
      };

      row.appendChild(sel);
      row.appendChild(inp);
      row.appendChild(del);
      list.appendChild(row);
    });
  },

  /* 手动添加一个空条目 */
  addResultItem() {
    this._ocrResults.push({
      id: 'ocr_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      subject: '其他',
      content: '',
    });
    this._renderResults();
    document.getElementById('ocrResultPanel').classList.add('show');
    // 聚焦到新增条目的 input
    const inputs = document.querySelectorAll('#ocrResultList input');
    if (inputs.length > 0) inputs[inputs.length - 1].focus();
  },

  /* 清空所有识别结果 */
  clearAll() {
    this._ocrResults = [];
    document.getElementById('ocrResultPanel').classList.remove('show');
    document.getElementById('ocrPreview').classList.remove('show');
    document.getElementById('ocrPreviewImg').src = '';
    document.getElementById('ocrLoading').classList.remove('show');
    document.getElementById('ocrError').classList.remove('show');
  },

  /* 全部导入到作业列表 */
  importAll() {
    if (AppState.isResting) { showToast('休息中，先休息一下吧～'); return; }
    const validItems = this._ocrResults.filter(r => r.content.trim());
    if (validItems.length === 0) {
      showToast('没有可导入的作业条目 ✏️');
      return;
    }
    let imported = 0;
    validItems.forEach(r => {
      const estimatedMinutes = AppState.estimateMinutes(r.content.trim());
      AppState.tasks.push({
        id: uid(),
        subject: r.subject,
        content: r.content.trim(),
        status: 'pending',
        elapsed: 0,
        estimatedMinutes,
      });
      imported++;
    });
    this.clearAll();
    render();
    showToast('已导入 ' + imported + ' 条作业 ✅');
  },
};

/* ==================================================================
   Keyboard
   ================================================================== */
document.getElementById('contentInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); Actions.addTask(); }
});

/* ==================================================================
   Notification — 系统通知作为闹钟后备（锁屏/后台也能收到）
   ================================================================== */
let _notifyGranted = false;

function _requestNotification() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'granted') { _notifyGranted = true; return; }
  if (Notification.permission !== 'denied') {
    Notification.requestPermission().then(p => { if (p === 'granted') _notifyGranted = true; });
  }
}

function _sendNotification() {
  if (!_notifyGranted || !('Notification' in window) || document.hidden !== true) return;
  try {
    new Notification('休息时间结束！', { body: '该继续做作业啦～', icon: '📝', tag: 'rest-end', requireInteraction: true });
  } catch { /* ignore */ }
}

/* ==================================================================
   每次用户交互时恢复 AudioContext（移动端锁屏后恢复播放）
   ================================================================== */
async function _onUserInteraction() {
  if (_audioCtx && _audioCtx.state === 'suspended') {
    try { await _audioCtx.resume(); } catch { /* 静默 */ }
  }
  // 锁屏期间 beep 未能播放，现在用户已交互，补播
  if (_pendingBeep && _audioCtx && _audioCtx.state === 'running') {
    _pendingBeep = false;
    _scheduleBeep(_audioCtx);
  }
  // 首次交互时请求通知权限
  if (!_notifyGranted && Notification.permission === 'default') {
    _requestNotification();
  }
}
document.addEventListener('touchstart', _onUserInteraction);
document.addEventListener('click', _onUserInteraction);

/* ==================================================================
   页面可见性变化 — 后台切回前台时立即刷新计时器
   ================================================================== */
function _catchUpTimers() {
  // 作业计时器：立即更新显示
  if (AppState.activeTaskId && AppState.timerStartAt) {
    const task = AppState.tasks.find(t => t.id === AppState.activeTaskId);
    if (task && task.status === 'active') {
      const elapsed = Math.floor((Date.now() - AppState.timerStartAt) / 1000);
      task.elapsed = elapsed;
      const el = document.getElementById('timer-' + AppState.activeTaskId);
      if (el) el.textContent = fmtTime(elapsed);
    }
  }

  // 休息计时器：用绝对时间戳追上实际剩余时间
  // tickRest() 发现 ≤0 时会自动调用 endRest() → 弹出闹钟 + 发送通知
  if (AppState.isResting && AppState._restEndAt) {
    tickRest();
  }
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) return;
  _catchUpTimers();
});

// 部分手机浏览器 visibilitychange 触发不稳定，focus 作为补充
window.addEventListener('focus', () => {
  _catchUpTimers();
});

/* ==================================================================
   Init
   ================================================================== */
AppState.load();
render();
</script>
